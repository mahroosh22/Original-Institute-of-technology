name: Compress Images
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  compress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install imagemin
        run: npm install -g imagemin-cli imagemin-mozjpeg imagemin-pngquant imagemin-webp

      - name: Compress JPG images
        run: imagemin *.jpg --out-dir=. --plugin=mozjpeg

      - name: Compress PNG images
        run: imagemin *.png --out-dir=. --plugin=pngquant

      - name: Compress WebP images
        run: imagemin *.webp --out-dir=. --plugin=webp

      - name: Commit compressed images
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.jpg *.png *.webp
          git diff --staged --quiet || git commit -m "Compress images"
          git push
